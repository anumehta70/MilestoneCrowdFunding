name: Deploy Contracts

# Manually triggered deployment workflow: this is the "smart contract
# deployment workflow" requirement. Run it from the Actions tab, or on
# tags like v1.0.0, to build + deploy all three contracts to a chosen
# Stellar network and print the resulting contract IDs.

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        default: "testnet"
        type: choice
        options:
          - testnet
          - mainnet
  push:
    tags:
      - "v*.*.*"

jobs:
  deploy:
    name: Build & Deploy Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Install Stellar CLI
        env:
          CARGO_HTTP_MULTIPLEXING: false
        run: cargo install --locked stellar-cli --version ^26

      - name: Configure deployer identity
        run: |
          mkdir -p ~/.config/stellar/identity
          echo "${{ secrets.STELLAR_DEPLOYER_SECRET_KEY }}" > ~/.config/stellar/identity/deployer.txt
          stellar keys use deployer || true

      - name: Build all contracts
        run: |
          stellar contract build --package vault
          stellar contract build --package escrow
          stellar contract build --package registry

      - name: Deploy Vault contract
        id: deploy_vault
        run: |
          VAULT_ID=$(stellar contract deploy \
            --wasm contracts/vault/target/wasm32v1-none/release/vault.wasm \
            --source deployer \
            --network ${{ github.event.inputs.network || 'testnet' }} )
          echo "vault_id=$VAULT_ID" >> "$GITHUB_OUTPUT"
          echo "Deployed Vault: $VAULT_ID"

      - name: Deploy Escrow contract
        id: deploy_escrow
        run: |
          ESCROW_ID=$(stellar contract deploy \
            --wasm contracts/escrow/target/wasm32v1-none/release/escrow.wasm \
            --source deployer \
            --network ${{ github.event.inputs.network || 'testnet' }} )
          echo "escrow_id=$ESCROW_ID" >> "$GITHUB_OUTPUT"
          echo "Deployed Escrow: $ESCROW_ID"

      - name: Deploy Registry contract
        id: deploy_registry
        run: |
          REGISTRY_ID=$(stellar contract deploy \
            --wasm contracts/registry/target/wasm32v1-none/release/registry.wasm \
            --source deployer \
            --network ${{ github.event.inputs.network || 'testnet' }} )
          echo "registry_id=$REGISTRY_ID" >> "$GITHUB_OUTPUT"
          echo "Deployed Registry: $REGISTRY_ID"

      - name: Print deployment summary
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Network: ${{ github.event.inputs.network || 'testnet' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Vault:    ${{ steps.deploy_vault.outputs.vault_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Escrow:   ${{ steps.deploy_escrow.outputs.escrow_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Registry: ${{ steps.deploy_registry.outputs.registry_id }}" >> "$GITHUB_STEP_SUMMARY"
